syntax = "proto3";

package plugin.v1;

import "plugin/v1/common.proto";

service SourceService {
  rpc GetSourceServiceMetadata(GetSourceServiceMetadataRequest) returns (GetSourceServiceMetadataResponse);
  rpc GetSourceItem(GetSourceItemRequest) returns (GetSourceItemResponse);
  rpc GetSourceCollection(GetSourceCollectionRequest) returns (GetSourceCollectionResponse);
}

message GetSourceServiceMetadataRequest {}
message GetSourceServiceMetadataResponse {
  string name = 1;
  string version = 2;
  string supported_pattern = 3;
}

message GetSourceItemRequest {
  string url = 1;
}
message GetSourceItemResponse {
  SourceItem item = 1;
}

message GetSourceCollectionRequest {
  string url = 1;
}
message GetSourceCollectionResponse {
  optional SourceCollection collection = 1;
  repeated SourceSummary sources = 2;
}

message SourceItem {
  string id = 1;
  optional string collection_url = 2;
  string url = 3;
  string title = 4;
  string content = 5;
  Language language = 6;
}
message SourceSummary {
  string id = 1;
  string url = 2;
  string title = 3;
}
message SourceCollection {
  string id = 1;
  string url = 2;
  string title = 3;
  string description = 4;
  string author = 5;
  repeated string tags = 6;
}
