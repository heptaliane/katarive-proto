syntax = "proto3";

package plugin.v1;

import "plugin/v1/common.proto";

service NarratorService {
  rpc Narrate(NarrateRequest) returns (NarrateResponse);
  rpc GetNarratorServiceMetadata(GetNarratorServiceMetadataRequest) returns (GetNarratorServiceMetadataResponse);
}

message NarrateRequest {
  string path = 1;
  string text = 2;
  Language language = 3;
  AudioEncoding encoding = 4;
  int32 speaker_id = 5;
  map<string, string> options = 6;
}
message NarrateResponse {
  bool error = 1;
  optional string reason = 2;
}

message GetNarratorServiceMetadataRequest {}
message GetNarratorServiceMetadataResponse {
  string name = 1;
  string version = 2;
  repeated AudioEncoding supported_encoding = 3;
  repeated SpeakerInfo speakers = 4;
  repeated NarratorOption options = 5;
}
message NarratorOption {
  string id = 1;
  string label = 2;
  string description = 3;
}
message SpeakerInfo {
  int32 id = 1;
  string name = 2;
}
enum AudioEncoding {
  AUDIO_ENCODING_UNSPECIFIED = 0;
  AUDIO_ENCODING_WAV = 1;
  AUDIO_ENCODING_MP3 = 2;
  AUDIO_ENCODING_M4A = 3;
}
