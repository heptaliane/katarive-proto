syntax = "proto3";

package plugin.v1;

service NarratorService {
  rpc GetMetadata(GetMetadataRequest) returns (GetMetadataResponse);
  rpc Narrate(NarrateRequest) returns (NarrateResponse);
  rpc JobStatus(JobStatusRequest) returns (JobStatusResponse);
}

message GetMetadataRequest {}
message GetMetadataResponse {
  string name = 1;
  string version = 2;
  repeated NarratorOption options = 3;
}
message NarratorOption {
  string id = 1;
  string label = 2;
  string description = 3;
}

message NarrateRequest {
  repeated string lines = 1;
  map<string, string> options = 2;
}
message NarrateResponse {
  string job_id = 1;
  string path = 2;
}

message JobStatusRequest {
  string job_id = 1;
}
message JobStatusResponse {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_PROGRESSING = 1;
    STATUS_SUCCESS = 2;
    STATUS_FAILED = 3;
  }

  Status status = 1;
}
