syntax = "proto3";

package plugin.v1;

service NarratorService {
  rpc Narrate(NarrateRequest) returns (NarrateResponse);
  rpc GetNarratorServiceMetadata(GetNarratorServiceMetadataRequest) returns (GetNarratorServiceMetadataResponse);
}

message NarrateRequest {
  string path = 1;
  string text = 2;
  map<string, string> options = 3;
}
message NarrateResponse {
  bool error = 1;
  optional string reason = 2;
}

message GetNarratorServiceMetadataRequest {}
message GetNarratorServiceMetadataResponse {
  string name = 1;
  string version = 2;
  repeated NarratorOption options = 3;
}
message NarratorOption {
  string id = 1;
  string label = 2;
  string description = 3;
}
