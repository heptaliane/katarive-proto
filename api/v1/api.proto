syntax = "proto3";

package api.v1;

service KatariveService {
  rpc GetNarration(GetNarrationRequest) returns (GetNarrationResponse);
  rpc GetNarrators(GetNarratorsRequest) returns (GetNarratorsResponse);
  rpc GetSourceItem(GetSourceItemRequest) returns (GetSourceItemResponse);
  rpc GetSourceCollection(GetSourceCollectionRequest) returns (GetSourceCollectionResponse);
  rpc GetSourceCollections(GetSourceCollectionsRequest) returns (GetSourceCollectionsResponse);
}

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_PROGRESSING = 1;
  JOB_STATUS_COMPLETED = 2;
  JOB_STATUS_FAILED = 3;
  JOB_STATUS_NOT_FOUND = 4;
}

message GetNarrationRequest {
  string url = 1;
  string narrator = 2;
  int32 speaker_id = 3;
}
message GetNarrationResponse {
  JobStatus status = 1;
  optional string path = 2;
}

message GetNarratorsRequest {}
message GetNarratorsResponse {
  repeated Narrator narrator = 1;
}
message Narrator {
  string name = 1;
  repeated Speaker speakers = 2;
}
message Speaker {
  int32 id = 1;
  string label = 2;
}

message GetSourceItemRequest {
  string url = 1;
  bool disable_cache = 2;
}
message GetSourceItemResponse {
  JobStatus status = 1;
  optional SourceItem item = 2;
  optional SourceCollection collection = 3;
}

message GetSourceCollectionRequest {
  string url = 1;
  bool disable_cache = 2;
}
message GetSourceCollectionResponse {
  JobStatus status = 1;
  optional SourceCollection collection = 2;
  repeated SourceSummary items = 3;
}

message GetSourceCollectionsRequest {}
message GetSourceCollectionsResponse {
  repeated SourceCollection collection = 1;
}

message SourceSummary {
  string id = 1;
  string url = 2;
  string title = 3;
}
message SourceItem {
  string id = 1;
  string url = 2;
  string title = 3;
  string content = 4;
}
message SourceCollection {
  string id = 1;
  string url = 2;
  string title = 3;
  string description = 4;
  string author = 5;
  repeated string tags = 6;
}
