syntax = "proto3";

package api.v1;

service KatariveService {
  rpc CreateNarration(CreateNarrationRequest) returns (CreateNarrationResponse);
  rpc GetJobStatus(GetJobStatusRequest) returns (GetJobStatusResponse);
  rpc GetSpeakers(GetSpeakersRequest) returns (GetSpeakersResponse);
  rpc GetSourceCollection(GetSourceCollectionRequest) returns (GetSourceCollectionResponse);
}

message CreateNarrationRequest {
  string url = 1;
  string narrator = 2;
  int32 speaker_id = 3;
}
message CreateNarrationResponse {
  string id = 1;
}

message GetJobStatusRequest {
  string id = 1;
}
message GetJobStatusResponse {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_PROGRESSING = 1;
    STATUS_COMPLETED = 2;
    STATUS_FAILED = 3;
    STATUS_NOT_FOUND = 4;
  }

  Status status = 1;
  optional string path = 2;
}

message GetSpeakersRequest {}
message GetSpeakersResponse {
  repeated Speaker speakers = 1;
}
message Speaker {
  string narrator = 1;
  int32 speaker_id = 2;
  string speaker_label = 3;
}

message GetSourceCollectionRequest {
  string url = 1;
  bool disable_cache = 2;
}
message GetSourceCollectionResponse {
  optional SourceCollection collection = 1;
  repeated SourceSummary sources = 2;
}
message SourceSummary {
  string id = 1;
  string url = 2;
  string title = 3;
}
message SourceCollection {
  string id = 1;
  string url = 2;
  string title = 3;
  string description = 4;
  string author = 5;
  repeated string tags = 6;
}
