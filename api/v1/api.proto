syntax = "proto3";

package api.v1;

service KatariveService {
  rpc QueueNarration(QueueNarrationRequest) returns (QueueNarrationResponse);
  rpc GetNarrationResult(GetNarrationResultRequest) returns (GetNarrationResultResponse);
  rpc GetNarrators(GetNarratorsRequest) returns (GetNarratorsResponse);
  rpc QueueSourceItem(QueueSourceItemRequest) returns (QueueSourceItemResponse);
  rpc GetSourceItem(GetSourceItemRequest) returns (GetSourceItemResponse);
  rpc QueueSourceCollection(QueueSourceCollectionRequest) returns (QueueSourceCollectionResponse);
  rpc GetSourceCollection(GetSourceCollectionRequest) returns (GetSourceCollectionResponse);
}

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_PROGRESSING = 1;
  JOB_STATUS_COMPLETED = 2;
  JOB_STATUS_FAILED = 3;
  JOB_STATUS_NOT_FOUND = 4;
}

message QueueNarrationRequest {
  string url = 1;
  string narrator = 2;
  int32 speaker_id = 3;
}
message QueueNarrationResponse {
  string id = 1;
}

message GetNarrationResultRequest {
  string id = 1;
}
message GetNarrationResultResponse {
  JobStatus status = 1;
  optional string path = 2;
}

message GetNarratorsRequest {}
message GetNarratorsResponse {
  repeated Narrator narrator = 1;
}
message Narrator {
  string name = 1;
  repeated Speaker speakers = 2;
}
message Speaker {
  int32 id = 1;
  string label = 2;
}

message QueueSourceItemRequest {
  string url = 1;
  bool disable_cache = 2;
}
message QueueSourceItemResponse {
  string id = 1;
}

message GetSourceItemRequest {
  string id = 1;
}
message GetSourceItemResponse {
  JobStatus status = 1;
  optional SourceSummary metadata = 2;
  optional string content = 3;
}

message QueueSourceCollectionRequest {
  string url = 1;
  bool disable_cache = 2;
}
message QueueSourceCollectionResponse {
  string id = 1;
}

message GetSourceCollectionRequest {
  string id = 1;
}
message GetSourceCollectionResponse {
  JobStatus status = 1;
  optional SourceCollection collection = 2;
  repeated SourceSummary sources = 3;
}
message SourceSummary {
  string id = 1;
  string url = 2;
  string title = 3;
}
message SourceCollection {
  string id = 1;
  string url = 2;
  string title = 3;
  string description = 4;
  string author = 5;
  repeated string tags = 6;
}
